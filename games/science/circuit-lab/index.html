<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circuit Lab – Dr. Lino's Learning Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --clr-bg:         #f5f0e8;
      --clr-surface:    #ffffff;
      --clr-text:       #2c2c3a;
      --clr-muted:      #7a7a8c;
      --clr-sci:        #4ecdc4;
      --clr-sci-soft:   #f0fdfb;
      --clr-fun:        #ffd166;
      --clr-header-bg:  #2c2c3a;
      --clr-header-txt: #f5f0e8;
      --radius-card:    18px;
      --radius-badge:   50px;
      --shadow-card:    0 4px 20px rgba(44,44,58,0.10);
      --font-display:   'Fredoka', sans-serif;
      --font-body:      'Nunito', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background-color: var(--clr-bg);
      color: var(--clr-text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background-color: var(--clr-header-bg);
      color: var(--clr-header-txt);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: relative;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -18px;
      left: 0; right: 0;
      height: 18px;
      background: var(--clr-header-bg);
      clip-path: ellipse(55% 100% at 50% 0%);
    }
    .back-link {
      color: var(--clr-sci);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      white-space: nowrap;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      padding: 0 0.5rem;
    }
    .back-link:hover { text-decoration: underline; }
    header h1 {
      font-family: var(--font-display);
      font-size: clamp(1.2rem, 4vw, 1.7rem);
      font-weight: 700;
      color: var(--clr-header-txt);
      flex: 1;
    }

    /* ── Main ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1rem 4rem;
    }

    /* ── Mode Tabs ── */
    .mode-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .mode-tab {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 600;
      padding: 0.5rem 1.25rem;
      border-radius: var(--radius-badge);
      border: 2px solid var(--clr-sci);
      background: var(--clr-surface);
      color: var(--clr-sci);
      cursor: pointer;
      min-height: 44px;
      transition: background 0.2s, color 0.2s;
    }
    .mode-tab.active { background: var(--clr-sci); color: var(--clr-text); }
    .mode-tab:hover:not(.active) { background: var(--clr-sci-soft); }

    /* ── Why Banner (above circuit) ── */
    .why-banner {
      background: var(--clr-sci-soft);
      border-left: 5px solid var(--clr-sci);
      border-radius: 0 var(--radius-card) var(--radius-card) 0;
      padding: 0.9rem 1.25rem;
      margin-bottom: 1.25rem;
      font-size: 1.05rem;
      line-height: 1.6;
      color: var(--clr-text);
      min-height: 60px;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      box-shadow: var(--shadow-card);
    }
    .why-banner .why-icon { font-size: 1.5rem; flex-shrink: 0; }
    .why-banner.flash { animation: bannerFlash 0.55s ease; }
    @keyframes bannerFlash {
      0%   { background: #fff3c4; border-color: #e0a800; }
      100% { background: var(--clr-sci-soft); border-color: var(--clr-sci); }
    }

    /* ── Circuit Card ── */
    .circuit-card {
      background: var(--clr-surface);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: 1.25rem 1rem;
      margin-bottom: 1.25rem;
      overflow-x: auto;
    }
    .circuit-card svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }
    .free-divider {
      border: none;
      border-top: 2px dashed rgba(78,205,196,0.3);
      margin: 0.75rem 0;
    }
    .circuit-sub-label {
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--clr-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.3rem;
      padding-left: 0.25rem;
    }

    /* ── Bulb Tray ── */
    .tray-label {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 600;
      color: var(--clr-muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .bulb-tray {
      background: var(--clr-surface);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: 0.9rem 1.25rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      min-height: 72px;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .bulb-item {
      background: var(--clr-sci-soft);
      border: 2px solid var(--clr-sci);
      border-radius: 12px;
      padding: 0.5rem 0.85rem;
      font-size: 1.35rem;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      min-width: 60px;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }
    .bulb-item:active { cursor: grabbing; }
    .bulb-item .b-label { font-size: 0.62rem; font-weight: 700; color: var(--clr-muted); line-height: 1; }
    .bulb-item.selected {
      border-color: #ff9f43;
      background: #fff8ee;
      box-shadow: 0 0 0 3px rgba(255,159,67,0.35);
    }
    .bulb-item.dragging { opacity: 0.35; }
    .tray-empty-msg { color: var(--clr-muted); font-size: 0.9rem; font-style: italic; }

    /* ── Stats Card ── */
    .stats-card {
      background: var(--clr-surface);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: 1.25rem 1.5rem;
    }
    .stats-card h2 {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .stats-sections { display: flex; gap: 1.25rem; flex-wrap: wrap; }
    .stats-section { flex: 1; min-width: 220px; }
    .stats-section-title {
      font-family: var(--font-display);
      font-size: 0.92rem;
      font-weight: 700;
      margin-bottom: 0.65rem;
      padding: 0.22rem 0.85rem;
      border-radius: 30px;
      display: inline-block;
      background: var(--clr-sci);
      color: var(--clr-text);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }
    .stat-item {
      background: var(--clr-bg);
      border-radius: 12px;
      padding: 0.5rem 0.75rem;
    }
    .stat-item.power-item {
      grid-column: 1 / -1;
      background: #fff8ee;
      border: 2px solid #f0a020;
    }
    .stat-item.empty-item { grid-column: 1 / -1; }
    .stat-label {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--clr-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.15rem;
    }
    .stat-value {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--clr-text);
    }
    .stat-value.power { color: #c07000; font-size: 1.25rem; }
    .stat-value.muted-val { color: var(--clr-muted); font-size: 0.92rem; font-family: var(--font-body); }
    .stat-formula { font-size: 0.7rem; color: #a06000; font-weight: 600; margin-top: 1px; }

    /* ── Footer ── */
    footer {
      background-color: var(--clr-header-bg);
      color: rgba(245,240,232,0.6);
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: 0.88rem;
    }
    footer a { color: var(--clr-fun); text-decoration: none; font-weight: 700; }
    footer a:hover { text-decoration: underline; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .stats-sections { flex-direction: column; }
      .mode-tab { font-size: 0.88rem; padding: 0.45rem 0.9rem; }
    }
  </style>
</head>
<body>

<header>
  <a href="../../../" class="back-link" aria-label="Back to all games">← Back to all games</a>
  <h1>💡 Circuit Lab — Light It Up!</h1>
</header>

<main role="main">

  <!-- Mode Tabs -->
  <div class="mode-tabs" role="tablist" aria-label="Circuit mode">
    <button class="mode-tab active" role="tab" aria-selected="true"  data-mode="series">Series Only</button>
    <button class="mode-tab"        role="tab" aria-selected="false" data-mode="parallel">Parallel Only</button>
    <button class="mode-tab"        role="tab" aria-selected="false" data-mode="free">Free Explore</button>
  </div>

  <!-- Why Banner — sits above circuit so it's always in view -->
  <div class="why-banner" id="why-banner" aria-live="polite" role="status">
    <span class="why-icon" aria-hidden="true">💡</span>
    <span id="why-text">Drag a light bulb onto the circuit to get started!</span>
  </div>

  <!-- Circuit Canvas -->
  <div class="circuit-card" id="circuit-canvas" aria-label="Circuit diagram"></div>

  <!-- Bulb Tray -->
  <p class="tray-label">💡 Bulb Tray — drag a bulb onto the circuit!</p>
  <div class="bulb-tray" id="bulb-tray" aria-label="Available light bulbs" role="region"></div>

  <!-- Stats Panel -->
  <div class="stats-card" id="stats-card" aria-live="polite" aria-label="Circuit statistics">
    <h2>📊 Circuit Stats</h2>
    <div class="stats-sections" id="stats-sections"></div>
  </div>

</main>

<footer>
  <p>Dr. Lino's Learning Games · <a href="https://linocoria.com" target="_blank" rel="noopener">linocoria.com</a></p>
</footer>

<script>
// ─── Constants & State ───────────────────────────────────────────────────
const VOLTAGE    = 9;          // V
const RESISTANCE = 3;          // Ω per bulb
const MAX_SLOTS  = 4;
const TOTAL_BULBS = 6;
const P_REF      = VOLTAGE * VOLTAGE / RESISTANCE; // 27W = 100% brightness

let mode          = 'series';
let seriesSlots   = new Array(MAX_SLOTS).fill(false);
let parallelSlots = new Array(MAX_SLOTS).fill(false);
let selectedBulb  = null;   // id of tap-selected tray bulb
let dragActive    = false;

function nS() { return seriesSlots.filter(Boolean).length; }
function nP() { return parallelSlots.filter(Boolean).length; }
function available() { return TOTAL_BULBS - nS() - nP(); }

// ─── Physics ─────────────────────────────────────────────────────────────
function calcSeries(n) {
  if (n === 0) return null;
  const R_total   = n * RESISTANCE;
  const I_circuit = VOLTAGE / R_total;
  const V_bulb    = I_circuit * RESISTANCE;   // = VOLTAGE / n
  const I_bulb    = I_circuit;
  const P_bulb    = V_bulb * I_bulb;          // P = V × I
  const bright    = Math.round(P_bulb / P_REF * 100);
  return { R_total, I_circuit, V_bulb, I_bulb, P_bulb, bright };
}

function calcParallel(n) {
  if (n === 0) return null;
  const R_total   = RESISTANCE / n;
  const I_circuit = VOLTAGE / R_total;        // total battery current
  const V_bulb    = VOLTAGE;                  // each bulb sees full 9V
  const I_bulb    = V_bulb / RESISTANCE;      // = 3A always
  const P_bulb    = V_bulb * I_bulb;          // = 27W always
  const bright    = 100;
  return { R_total, I_circuit, V_bulb, I_bulb, P_bulb, bright };
}

// ─── SVG Layout Constants ────────────────────────────────────────────────
const SVG_W      = 760;
const BAT_X      = 52;          // battery center x
const RAIL_START = 92;          // x where rails begin (right of battery)
const RAIL_END   = 712;         // x of right-side closing wire

// Slot x positions: evenly spaced across the rail
const SLOT_STEP  = (RAIL_END - RAIL_START) / (MAX_SLOTS + 1); // ≈ 124
function slotX(i) { return Math.round(RAIL_START + SLOT_STEP * (i + 1)); }

// Series circuit geometry
const S_TOP_Y = 95;    // y of top wire (where bulbs sit above)
const S_BOT_Y = 180;   // y of bottom return wire
const S_H     = 210;   // SVG viewBox height

// Parallel circuit geometry
const P_TOP_Y = 58;    // y of top rail
const P_BOT_Y = 182;   // y of bottom rail
const P_H     = 215;   // SVG viewBox height

// ─── SVG Building Blocks ─────────────────────────────────────────────────

// Battery group: vertical symbol with + terminal connected to topY, − to botY
function batteryGroup(topY, botY, active) {
  const midY  = (topY + botY) / 2;
  const hH    = Math.min(30, (botY - topY) * 0.3);
  const bT    = midY - hH, bB = midY + hH;
  const wc    = active ? '#4ecdc4' : '#ccc';
  const bs    = active ? '#4ecdc4' : '#aaa';
  return `
    <!-- battery terminal wires -->
    <line x1="${BAT_X}" y1="${bT}" x2="${BAT_X}" y2="${topY}"
      stroke="${wc}" stroke-width="3" stroke-linecap="round"/>
    <line x1="${BAT_X}" y1="${bB}" x2="${BAT_X}" y2="${botY}"
      stroke="${wc}" stroke-width="3" stroke-linecap="round"/>
    <!-- battery body -->
    <rect x="${BAT_X - 13}" y="${bT}" width="26" height="${bB - bT}"
      rx="5" fill="#2c2c3a" stroke="${bs}" stroke-width="2"/>
    <text x="${BAT_X}" y="${midY - 5}" text-anchor="middle"
      font-family="Fredoka,sans-serif" font-size="12" font-weight="700" fill="#ffd166">9V</text>
    <text x="${BAT_X}" y="${midY + 9}" text-anchor="middle"
      font-family="Nunito,sans-serif" font-size="9" fill="#aaa">bat</text>
    <!-- polarity labels -->
    <text x="${BAT_X + 16}" y="${topY + 5}" font-size="13"
      fill="${active ? '#4ecdc4' : '#bbb'}" font-weight="700">+</text>
    <text x="${BAT_X + 16}" y="${botY + 1}" font-size="13"
      fill="${active ? '#888' : '#ccc'}" font-weight="700">−</text>`;
}

// Glow filter definition
function glowFilter(id, brightness) {
  const blur = 1.5 + brightness * 0.11;
  const op   = 0.35 + brightness * 0.006;
  return `<filter id="${id}" x="-70%" y="-70%" width="240%" height="240%">
    <feGaussianBlur stdDeviation="${blur}" result="b"/>
    <feFlood flood-color="#ffd166" flood-opacity="${op}" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="gw"/>
    <feMerge><feMergeNode in="gw"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>`;
}

// Draw a placed bulb.
// cx, cy = glass circle center
// actualPW = actual power in watts (used for label — pass from physics, not from bright %)
// wireConnA/B = the two wire connection points (where the circuit wire meets the bulb leads)
// labelX/Y = position for the power label
function drawnBulb(cx, cy, bright, actualPW, slotIdx, rail, wireAx, wireAy, wireBx, wireBy, labelX, labelY) {
  const R   = 15;
  const bf  = bright / 100;
  const fid = `gf-${rail[0]}-${slotIdx}`;

  // Colors
  const glassAlpha  = 0.15 + bf * 0.72;
  const glassColor  = bright > 0 ? `rgba(255,248,155,${glassAlpha})` : '#e2e2e2';
  const glassStroke = bright > 0 ? `hsl(46,90%,${42 + bf * 28}%)` : '#c0c0c0';
  const filColor    = bright > 0 ? `hsl(36,100%,${16 + bf * 46}%)` : '#888';
  const baseColor   = bright > 0 ? '#a07010' : '#bbb';

  const powerW = bright > 0 ? actualPW.toFixed(2) + ' W' : '';

  // Leads: from glass-bottom corners to wire connection points
  // base rect sits just below glass
  const baseTop = cy + R - 1;
  const baseBot = cy + R + 6;
  const lc = cx - 7, rc = cx + 7; // left/right lead x

  return `
    ${bright > 0 ? glowFilter(fid, bright) : ''}
    <g class="placed-bulb" data-slot="${slotIdx}" data-rail="${rail}"
       role="button" tabindex="0"
       aria-label="Placed bulb slot ${slotIdx + 1}, click to remove"
       style="cursor:pointer">
      <!-- leads from circuit wire to bulb base -->
      <line x1="${wireAx}" y1="${wireAy}" x2="${lc}" y2="${baseBot}"
        stroke="#bbb" stroke-width="2" stroke-linecap="round"/>
      <line x1="${wireBx}" y1="${wireBy}" x2="${rc}" y2="${baseBot}"
        stroke="#bbb" stroke-width="2" stroke-linecap="round"/>
      <!-- glow + bulb body -->
      <g ${bright > 0 ? `filter="url(#${fid})"` : ''}>
        <circle cx="${cx}" cy="${cy}" r="${R}"
          fill="${glassColor}" stroke="${glassStroke}" stroke-width="2"/>
        <path d="M${cx-5},${cy+7} Q${cx-2},${cy-2} ${cx},${cy-7} Q${cx+2},${cy-2} ${cx+5},${cy+7}"
          stroke="${filColor}" stroke-width="2.2" fill="none" stroke-linecap="round"/>
        <rect x="${lc}" y="${baseTop}" width="${rc - lc}" height="7"
          rx="1" fill="${baseColor}"/>
      </g>
      <!-- power label -->
      ${powerW ? `<text x="${labelX}" y="${labelY}"
        text-anchor="middle" font-family="Nunito,sans-serif"
        font-size="11" font-weight="700" fill="#c07000">${powerW}</text>` : ''}
      <!-- transparent hit target -->
      <rect x="${Math.min(wireAx, wireBx, cx) - 8}" y="${Math.min(wireAy, wireBy, cy - R) - 4}"
        width="${Math.max(wireAx, wireBx, cx) - Math.min(wireAx, wireBx, cx) + 24}"
        height="${Math.max(wireAy, wireBy, cy + R) - Math.min(wireAy, wireBy, cy - R) + 20}"
        fill="transparent"/>
    </g>`;
}

// Drop zone: dashed socket circle with lead stubs
// cx, cy = socket center; wireAx/y, wireBx/y = wire end points of the two lead stubs
function dropZone(cx, cy, slotIdx, rail, active, wireAx, wireAy, wireBx, wireBy) {
  const R   = 15;
  const col = active ? '#4ecdc4' : '#ccc';
  const fill = active ? 'rgba(78,205,196,0.1)' : 'rgba(0,0,0,0.03)';
  const lc  = cx - 7, rc = cx + 7;
  const baseBot = cy + R + 6;

  return `
    <g class="drop-zone" data-slot="${slotIdx}" data-rail="${rail}"
       role="button" tabindex="0"
       aria-label="Empty socket ${slotIdx + 1} on ${rail} circuit, drop a bulb here">
      <!-- dashed lead stubs -->
      <line x1="${wireAx}" y1="${wireAy}" x2="${lc}" y2="${baseBot}"
        stroke="${col}" stroke-width="2" stroke-dasharray="3 2"/>
      <line x1="${wireBx}" y1="${wireBy}" x2="${rc}" y2="${baseBot}"
        stroke="${col}" stroke-width="2" stroke-dasharray="3 2"/>
      <!-- dashed socket -->
      <circle cx="${cx}" cy="${cy}" r="${R}"
        fill="${fill}" stroke="${col}" stroke-width="2" stroke-dasharray="4 3"/>
      <text x="${cx}" y="${cy + 6}" text-anchor="middle"
        font-size="14" fill="${col}" font-weight="600">+</text>
      <!-- hit target -->
      <rect x="${Math.min(wireAx, wireBx, cx) - 8}"
            y="${Math.min(wireAy, wireBy, cy - R) - 4}"
            width="${Math.max(wireAx, wireBx, cx) - Math.min(wireAx, wireBx, cx) + 24}"
            height="${Math.max(wireAy, wireBy, cy + R) - Math.min(wireAy, wireBy, cy - R) + 20}"
            fill="transparent"/>
    </g>`;
}

// ─── Series Circuit SVG ──────────────────────────────────────────────────
// One closed rectangular loop:
//   battery(+) → top wire → [bulbs inline] → right wire → bottom wire → battery(-)
//
// Bulbs sit ABOVE the top wire. Each bulb breaks the top wire into segments;
// the two leads run down from the bulb base to the wire level.
function buildSeriesSVG(active) {
  const n    = nS();
  const stat = calcSeries(n);
  const pct  = stat ? stat.bright : 0;
  const pw   = stat ? stat.P_bulb : 0;
  const wc   = active ? '#4ecdc4' : '#ccc';

  // Bulb glass center is 38px above the top wire
  const BULB_CY = S_TOP_Y - 38;  // = 57

  let svg = `<svg viewBox="0 0 ${SVG_W} ${S_H}" xmlns="http://www.w3.org/2000/svg"
    aria-label="Series circuit diagram">
    <defs></defs>`;

  // Battery
  svg += batteryGroup(S_TOP_Y, S_BOT_Y, active);

  // Bottom return wire (continuous — the return path)
  svg += `<line x1="${BAT_X}" y1="${S_BOT_Y}" x2="${RAIL_END}" y2="${S_BOT_Y}"
    stroke="${wc}" stroke-width="3" stroke-linecap="round"/>`;

  // Right closing wire
  svg += `<line x1="${RAIL_END}" y1="${S_TOP_Y}" x2="${RAIL_END}" y2="${S_BOT_Y}"
    stroke="${wc}" stroke-width="3" stroke-linecap="round"/>`;

  // Top wire — breaks only where a bulb is placed; empty slots float above it.
  // prevX tracks the rightmost x the continuous wire has reached so far.
  // For occupied slots  : wire stops at lc, teal leads + bulb drawn, prevX = rc.
  // For empty slots     : wire keeps running straight (prevX unchanged),
  //                       socket drawn with zero-length internal leads so it
  //                       floats detached above the wire — no connection implied.
  let prevX = RAIL_START;
  for (let i = 0; i < MAX_SLOTS; i++) {
    const cx      = slotX(i);
    const lc      = cx - 7;   // left lead contact on wire
    const rc      = cx + 7;   // right lead contact on wire
    const baseBot = BULB_CY + 15 + 6; // bottom of bulb base rect

    if (seriesSlots[i] && active) {
      // Wire segment up to where this bulb's left lead joins
      svg += `<line x1="${prevX}" y1="${S_TOP_Y}" x2="${lc}" y2="${S_TOP_Y}"
        stroke="${wc}" stroke-width="3" stroke-linecap="round"/>`;
      // Teal leads rising from the wire gap up into the bulb
      svg += `<line x1="${lc}" y1="${S_TOP_Y}" x2="${lc}" y2="${baseBot}"
        stroke="${wc}" stroke-width="2.5" stroke-linecap="round"/>`;
      svg += `<line x1="${rc}" y1="${S_TOP_Y}" x2="${rc}" y2="${baseBot}"
        stroke="${wc}" stroke-width="2.5" stroke-linecap="round"/>`;
      svg += drawnBulb(
        cx, BULB_CY, pct, pw, i, 'series',
        lc, S_TOP_Y,       // wire contact A
        rc, S_TOP_Y,       // wire contact B
        cx, S_TOP_Y + 14   // power label (below wire)
      );
      prevX = rc; // wire resumes after the bulb gap
    } else {
      // Empty slot: wire does NOT break here.
      // Socket floats above the wire; zero-length leads keep it visually detached.
      svg += dropZone(
        cx, BULB_CY, i, 'series', active,
        lc, baseBot,   // wireA == base corner → zero-length lead A (invisible)
        rc, baseBot    // wireB == base corner → zero-length lead B (invisible)
      );
      // prevX intentionally NOT updated — wire runs straight under this socket
    }
  }
  // Remainder of top wire from last bulb (or RAIL_START) to closing wire
  svg += `<line x1="${prevX}" y1="${S_TOP_Y}" x2="${RAIL_END}" y2="${S_TOP_Y}"
    stroke="${wc}" stroke-width="3" stroke-linecap="round"/>`;

  svg += `</svg>`;
  return svg;
}

// ─── Parallel Circuit SVG ────────────────────────────────────────────────
// Classic ladder topology:
//   Two continuous horizontal rails (top & bottom).
//   Battery on left bridges the two rails.
//   Each bulb is a vertical branch ("rung") connecting top rail to bottom rail.
//   Right side: closing wire connects the two rails.
//
// A single bulb in any branch gets the full 9V — independent of other branches.
function buildParallelSVG(active) {
  const n    = nP();
  const stat = calcParallel(n);
  const pct  = stat ? 100 : 0;
  const wc   = active ? '#4ecdc4' : '#ccc';

  // Bulb glass center is midway between the two rails
  const BULB_CY = Math.round((P_TOP_Y + P_BOT_Y) / 2);  // = 120

  let svg = `<svg viewBox="0 0 ${SVG_W} ${P_H}" xmlns="http://www.w3.org/2000/svg"
    aria-label="Parallel circuit diagram">
    <defs></defs>`;

  // Battery (bridges top and bottom rails on the left)
  svg += batteryGroup(P_TOP_Y, P_BOT_Y, active);

  // Top rail (continuous positive bus)
  svg += `<line x1="${RAIL_START}" y1="${P_TOP_Y}" x2="${RAIL_END}" y2="${P_TOP_Y}"
    stroke="${wc}" stroke-width="3" stroke-linecap="round"/>`;

  // Bottom rail (continuous negative/return bus)
  svg += `<line x1="${RAIL_START}" y1="${P_BOT_Y}" x2="${RAIL_END}" y2="${P_BOT_Y}"
    stroke="${wc}" stroke-width="3" stroke-linecap="round"/>`;

  // Right closing wire
  svg += `<line x1="${RAIL_END}" y1="${P_TOP_Y}" x2="${RAIL_END}" y2="${P_BOT_Y}"
    stroke="${wc}" stroke-width="3" stroke-linecap="round"/>`;

  // Bulb branches (vertical rungs of the ladder)
  // Each bulb connects from top rail (cx, P_TOP_Y) down to bottom rail (cx, P_BOT_Y)
  // Lead connection points: (cx, P_TOP_Y) at top, (cx, P_BOT_Y) at bottom
  for (let i = 0; i < MAX_SLOTS; i++) {
    const cx      = slotX(i);
    const baseBot = BULB_CY + 15 + 6; // glass bottom + base

    if (parallelSlots[i] && active) {
      // Teal wire leads from rails to bulb
      svg += `<line x1="${cx}" y1="${P_TOP_Y}" x2="${cx}" y2="${BULB_CY - 15}"
        stroke="${wc}" stroke-width="2.5" stroke-linecap="round"/>`;
      svg += `<line x1="${cx}" y1="${baseBot}" x2="${cx}" y2="${P_BOT_Y}"
        stroke="${wc}" stroke-width="2.5" stroke-linecap="round"/>`;
      // Power label: to the right of bulb, at mid-height
      svg += drawnBulb(
        cx, BULB_CY, 100, P_REF, i, 'parallel',
        cx, P_TOP_Y,         // top wire contact
        cx, P_BOT_Y,         // bottom wire contact
        cx + 26, BULB_CY + 5  // power label position (right of bulb)
      );
    } else {
      // Vertical dashed stubs from each rail down/up to the socket
      const glassTopY = BULB_CY - 15;
      const col = active ? '#4ecdc4' : '#ccc';
      svg += `<line x1="${cx}" y1="${P_TOP_Y}" x2="${cx}" y2="${glassTopY}"
        stroke="${col}" stroke-width="2" stroke-dasharray="3 2"/>`;
      svg += `<line x1="${cx}" y1="${baseBot}" x2="${cx}" y2="${P_BOT_Y}"
        stroke="${col}" stroke-width="2" stroke-dasharray="3 2"/>`;
      // Zero-length leads so dropZone draws no internal diagonals
      const lc = cx - 7, rc = cx + 7;
      svg += dropZone(cx, BULB_CY, i, 'parallel', active,
        lc, baseBot, rc, baseBot);
    }
  }

  svg += `</svg>`;
  return svg;
}

// ─── Render Circuit ───────────────────────────────────────────────────────
function renderCircuit() {
  const canvas = document.getElementById('circuit-canvas');

  if (mode === 'series') {
    canvas.innerHTML = buildSeriesSVG(true);
  } else if (mode === 'parallel') {
    canvas.innerHTML = buildParallelSVG(true);
  } else {
    // Free Explore: both circuits stacked
    canvas.innerHTML = `
      <div class="circuit-sub-label">Series Circuit — one path for current</div>
      ${buildSeriesSVG(true)}
      <hr class="free-divider"/>
      <div class="circuit-sub-label">Parallel Circuit — each bulb has its own path</div>
      ${buildParallelSVG(true)}`;
  }

  attachCircuitEvents();
}

// ─── Render Stats ─────────────────────────────────────────────────────────
function f(v, d = 2) { return v.toFixed(d); }

function renderStats() {
  const sections = document.getElementById('stats-sections');
  const showS = (mode === 'series'   || mode === 'free');
  const showP = (mode === 'parallel' || mode === 'free');
  let html = '';

  if (showS) {
    const ss = calcSeries(nS());
    html += `<div class="stats-section">
      <div class="stats-section-title">Series</div>
      <div class="stats-grid">`;
    if (!ss) {
      html += `<div class="stat-item empty-item">
        <div class="stat-value muted-val">No bulbs placed yet</div></div>`;
    } else {
      html += `
        <div class="stat-item">
          <div class="stat-label">Bulbs</div>
          <div class="stat-value">${nS()}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Total Resistance</div>
          <div class="stat-value">${ss.R_total} Ω</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Circuit Current</div>
          <div class="stat-value">${f(ss.I_circuit)} A</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Voltage / bulb</div>
          <div class="stat-value">${f(ss.V_bulb)} V</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Current / bulb</div>
          <div class="stat-value">${f(ss.I_bulb)} A</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Brightness</div>
          <div class="stat-value">${ss.bright}%</div>
        </div>
        <div class="stat-item power-item">
          <div class="stat-label">⚡ Power per bulb — P = V × I</div>
          <div class="stat-value power">${f(ss.P_bulb)} W</div>
          <div class="stat-formula">${f(ss.V_bulb)} V × ${f(ss.I_bulb)} A = ${f(ss.P_bulb)} W</div>
        </div>`;
    }
    html += `</div></div>`;
  }

  if (showP) {
    const ps = calcParallel(nP());
    html += `<div class="stats-section">
      <div class="stats-section-title">Parallel</div>
      <div class="stats-grid">`;
    if (!ps) {
      html += `<div class="stat-item empty-item">
        <div class="stat-value muted-val">No bulbs placed yet</div></div>`;
    } else {
      html += `
        <div class="stat-item">
          <div class="stat-label">Bulbs</div>
          <div class="stat-value">${nP()}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Total Resistance</div>
          <div class="stat-value">${f(ps.R_total)} Ω</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Circuit Current</div>
          <div class="stat-value">${f(ps.I_circuit)} A</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Voltage / bulb</div>
          <div class="stat-value">9.00 V</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Current / bulb</div>
          <div class="stat-value">3.00 A</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Brightness</div>
          <div class="stat-value">100%</div>
        </div>
        <div class="stat-item power-item">
          <div class="stat-label">⚡ Power per bulb — P = V × I</div>
          <div class="stat-value power">27.00 W</div>
          <div class="stat-formula">9.00 V × 3.00 A = 27.00 W</div>
        </div>`;
    }
    html += `</div></div>`;
  }

  sections.innerHTML = html;
}

// ─── Render Tray ──────────────────────────────────────────────────────────
function renderTray() {
  const tray = document.getElementById('bulb-tray');
  const avail = available();

  if (avail <= 0) {
    tray.innerHTML = '<span class="tray-empty-msg">All bulbs are placed! Click a bulb in the circuit to remove it.</span>';
    return;
  }

  tray.innerHTML = '';
  for (let i = 0; i < avail; i++) {
    const el = document.createElement('div');
    el.className = 'bulb-item';
    el.draggable = true;
    el.id = `tb-${i}`;
    el.setAttribute('role', 'button');
    el.setAttribute('tabindex', '0');
    el.setAttribute('aria-label', '3 ohm light bulb — drag or tap to place in circuit');
    el.innerHTML = `<span>💡</span><span class="b-label">3Ω</span>`;
    el.addEventListener('dragstart', onDragStart);
    el.addEventListener('click', onTapBulb);
    el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') onTapBulb.call(el, e); });
    tray.appendChild(el);
  }
}

// ─── Why Banner ───────────────────────────────────────────────────────────
const MSGS = {
  'series-first':       "Great start! Watch the Power per bulb (P = V × I) — that's what tells you how bright each bulb will be.",
  'series-add':         "You added a bulb in series! The current has to push through more resistance, so it slows down — and every bulb gets dimmer.",
  'series-remove':      "You removed a series bulb! Less resistance means more current flows — the remaining bulbs get brighter.",
  'series-power-up':    "More current is flowing now! Each bulb's power jumped to {P} W (P = V × I) — that's why they're brighter!",
  'series-power-down':  "The current slowed down. Each bulb is now using only {P} W (P = V × I) — less power means dimmer light.",
  'parallel-first':     "Great start! Watch the Power per bulb (P = V × I) — that's what tells you how bright each bulb will be.",
  'parallel-add':       "You added a bulb in parallel! Each bulb has its own path to the battery, so they all get the full 9V — brightness stays the same!",
  'parallel-remove':    "You removed a parallel bulb. The other bulbs still have their own paths to the battery, so their brightness doesn't change.",
  'parallel-power-same':"Even with {n} bulbs, each one still gets 9 V and uses 27.00 W (P = 9 V × 3 A). Parallel keeps power constant!",
  'empty':              "The circuit is empty. Drag a bulb onto the circuit to see what happens!",
  'default':            "Drag a light bulb onto the circuit to get started!",
};

function formatMsg(key, data = {}) {
  let msg = MSGS[key] || MSGS.default;
  Object.entries(data).forEach(([k, v]) => {
    msg = msg.replaceAll(`{${k}}`, v);
  });
  return msg;
}

function setWhy(key, data = {}) {
  document.getElementById('why-text').textContent = formatMsg(key, data);
  const banner = document.getElementById('why-banner');
  banner.classList.remove('flash');
  void banner.offsetWidth; // force reflow to restart animation
  banner.classList.add('flash');
}

// ─── Drag & Drop ──────────────────────────────────────────────────────────
function onDragStart(e) {
  dragActive = true;
  e.dataTransfer.setData('text/plain', 'bulb');
  this.classList.add('dragging');
  clearTapSel();
}

document.addEventListener('dragend', () => {
  dragActive = false;
  document.querySelectorAll('.bulb-item.dragging').forEach(el => el.classList.remove('dragging'));
});

function attachCircuitEvents() {
  const root = document.getElementById('circuit-canvas');
  if (!root) return;

  root.querySelectorAll('.drop-zone').forEach(zone => {
    // Desktop drag
    zone.addEventListener('dragover', e => {
      e.preventDefault();
      zone.style.filter = 'drop-shadow(0 0 8px rgba(78,205,196,0.9))';
    });
    zone.addEventListener('dragleave', () => { zone.style.filter = ''; });
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.style.filter = '';
      if (!dragActive) return;
      dragActive = false;
      document.querySelectorAll('.bulb-item.dragging').forEach(el => el.classList.remove('dragging'));
      placeBulb(+zone.dataset.slot, zone.dataset.rail);
    });
    // Touch tap-to-place
    zone.addEventListener('click', () => {
      if (selectedBulb !== null) {
        placeBulb(+zone.dataset.slot, zone.dataset.rail);
        clearTapSel();
      }
    });
    zone.addEventListener('keydown', e => {
      if ((e.key === 'Enter' || e.key === ' ') && selectedBulb !== null) {
        placeBulb(+zone.dataset.slot, zone.dataset.rail);
        clearTapSel();
      }
    });
  });

  root.querySelectorAll('.placed-bulb').forEach(bulb => {
    const slot = +bulb.dataset.slot;
    const rail = bulb.dataset.rail;
    bulb.addEventListener('click', () => removeBulb(slot, rail));
    bulb.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') removeBulb(slot, rail); });
  });
}

// ─── Tap-to-place ─────────────────────────────────────────────────────────
function onTapBulb(e) {
  e.stopPropagation();
  const id = e.currentTarget.id;
  if (selectedBulb === id) { clearTapSel(); return; }
  clearTapSel();
  selectedBulb = id;
  document.getElementById(id)?.classList.add('selected');
}

function clearTapSel() {
  selectedBulb = null;
  document.querySelectorAll('.bulb-item.selected').forEach(el => el.classList.remove('selected'));
}

document.addEventListener('click', e => {
  if (!e.target.closest('.bulb-item') && !e.target.closest('.drop-zone')) clearTapSel();
});

// ─── Place / Remove ───────────────────────────────────────────────────────
function placeBulb(slot, rail) {
  if (available() <= 0) return;

  if (rail === 'series') {
    if (mode === 'parallel') return;
    if (seriesSlots[slot]) return;
    seriesSlots[slot] = true;
    const ss = calcSeries(nS());
    if (nS() === 1) {
      setWhy('series-first');
    } else {
      setWhy('series-power-down', { P: ss.P_bulb.toFixed(2) });
    }

  } else {
    if (mode === 'series') return;
    if (parallelSlots[slot]) return;
    parallelSlots[slot] = true;
    if (nP() === 1) {
      setWhy('parallel-first');
    } else {
      setWhy('parallel-power-same', { n: nP() });
    }
  }

  refresh();
}

function removeBulb(slot, rail) {
  if (rail === 'series') {
    if (!seriesSlots[slot]) return;
    seriesSlots[slot] = false;
    if (nS() + nP() === 0) {
      setWhy('empty');
    } else if (nS() === 0) {
      setWhy('empty');
    } else {
      const ss = calcSeries(nS());
      setWhy('series-power-up', { P: ss.P_bulb.toFixed(2) });
    }

  } else {
    if (!parallelSlots[slot]) return;
    parallelSlots[slot] = false;
    if (nS() + nP() === 0) {
      setWhy('empty');
    } else if (nP() === 0) {
      setWhy('empty');
    } else {
      setWhy('parallel-power-same', { n: nP() });
    }
  }

  refresh();
}

// ─── Mode Tabs ────────────────────────────────────────────────────────────
document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.mode-tab').forEach(t => {
      t.classList.remove('active');
      t.setAttribute('aria-selected', 'false');
    });
    tab.classList.add('active');
    tab.setAttribute('aria-selected', 'true');
    mode = tab.dataset.mode;
    seriesSlots.fill(false);
    parallelSlots.fill(false);
    clearTapSel();
    setWhy('default');
    refresh();
  });
});

// ─── Refresh & Init ───────────────────────────────────────────────────────
function refresh() {
  renderCircuit();
  renderStats();
  renderTray();
}

setWhy('default');
refresh();
</script>
</body>
</html>
